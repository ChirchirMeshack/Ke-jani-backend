name: Test & Deploy Kejani Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Set the working directory for all run steps in this job
    # since manage.py and requirements.txt are inside the kejani_backend folder
    defaults:
      run:
        working-directory: ./kejani_backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Matched to your local 3.12 environment
          cache: "pip"
          cache-dependency-path: kejani_backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-ci-secret-key-not-used-in-production
          DEBUG: "True"
          ALLOWED_HOSTS: localhost
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          CSRF_TRUSTED_ORIGINS: http://localhost:3000
        run: python manage.py test --verbosity=2

      - name: Check no pending migrations
        env:
          SECRET_KEY: test-ci-secret-key-not-used-in-production
          DEBUG: "True"
          ALLOWED_HOSTS: localhost
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          CSRF_TRUSTED_ORIGINS: http://localhost:3000
        run: python manage.py makemigrations --check --dry-run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: cd /var/www/kejani/backend && bash deploy.sh

      - name: Health check (5 retries with backoff)
        run: |
          sleep 20
          for i in {1..5}; do
            echo "Health check attempt $i..."
            curl --fail --silent https://ke-jani.co.ke/api/health/ && exit 0
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All health check attempts failed!"
          exit 1

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "text=✅ Kejani backend deployed successfully
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "text=❌ Kejani backend deploy FAILED
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}
            Check: https://github.com/${{ github.repository }}/actions" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
